meta:
  name: bug-fix-workflow
  description: Four-step bug fixing with root cause confirmation before editing
steps:
- id: localize
  prompt: 'Locate the relevant source files for the bug. Search for files related
    to the issue using grep, find, or similar tools. Identify the key files that likely
    contain the bug. Report the file paths and a brief summary of what each contains.

    '
  tools:
  - bash
  - str_replace_editor
  inputs: []
- id: investigate
  prompt: 'Examine the code structure and understand the bug. Read the relevant files
    identified in the previous step. Use interactive Python execution to test hypotheses
    about the bug. Identify the root cause before attempting any fixes. Report your
    findings including the exact location of the bug and what needs to be changed.

    '
  tools:
  - bash
  - str_replace_editor
  inputs:
  - localize
- id: fix
  prompt: 'Apply the targeted code modification to fix the bug. Based on the root
    cause identified in the previous step, make the minimal necessary change to fix
    the issue. Ensure the fix is correct and doesn''t introduce new problems.

    '
  tools:
  - str_replace_editor
  inputs:
  - investigate
- id: validate
  prompt: 'Test the fix thoroughly. Run targeted test cases that cover edge cases,
    then run the full test suite to ensure no regressions. Consolidate multiple test
    runs into a single comprehensive validation step.

    '
  tools:
  - bash
  - str_replace_editor
  inputs:
  - fix
